apiVersion: apps/v1
kind: Deployment
metadata:
  name: suscripciones-app
  labels:
    app: suscripciones
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: suscripciones
  template:
    metadata:
      labels:
        app: suscripciones
      annotations:
        
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"
    spec:
      containers:
      - name: suscripciones-node
        image: ${{ secrets.DOCKER_USERNAME }}/suscripciones:latest 
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        env:
        - name: NODE_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: suscripciones-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: suscripciones